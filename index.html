<!DOCTYPE html>
<html>
<head>
    <title>AI Support Chat</title>
</head>
<body>

<h2>AI Customer Support Chat</h2>

<div id="chatBox" style="border:1px solid black; height:300px; overflow:auto; padding:10px;"></div>

<br>

<!-- ✅ Language dropdown -->
<select id="lang">
    <option value="both">Both</option>
    <option value="en">English</option>
    <option value="ar">Arabic</option>
</select>

<input type="text" id="inputText" placeholder="Type your message..." style="width:300px;">
<button onclick="sendMessage()">Send</button>

<script>
    async function sendMessage() {

        let input = document.getElementById("inputText");
        let text = input.value;

        if (!text) return;

        let chatBox = document.getElementById("chatBox");

        // ✅ user message
        chatBox.innerHTML += `<p><b>You:</b> ${text}</p>`;

        input.value = "";

        // ✅ get selected language
        let lang = document.getElementById("lang").value;

        // ✅ API call WITH lang
        let response = await fetch(
            `http://127.0.0.1:8000/analyze?text=${encodeURIComponent(text)}&lang=${lang}`
        );

        let data = await response.json();

        // ✅ safe replies
        let reply_en = data.reply_en || "";
        let reply_ar = data.reply_ar || "";

        let finalReply = "";

        if (lang === "en") {
            finalReply = reply_en || "Sorry, I couldn't understand.";
        } 
        else if (lang === "ar") {
            finalReply = reply_ar || "عذرًا، لم أفهم طلبك.";
        } 
        else {
            finalReply = `
                ${reply_en || ""}
                <br><br>
                ${reply_ar || ""}
            `;
        }

        // ✅ AI message
        chatBox.innerHTML += `<p><b>AI:</b> ${finalReply}</p>`;

        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
